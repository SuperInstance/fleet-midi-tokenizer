name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify files
        run: |
          echo "✅ Repo structure valid"
          ls -la
      - name: Check README
        run: |
          test -f README.md && echo "✅ README exists" || echo "❌ No README"
